<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Transações - Finance App')}"></th:block>

<body>
    <th:block th:replace="~{fragments/head :: header}"></th:block>
    <div class="container mt-4">
        <!-- Fragment de mensagens -->
        <th:block th:replace="~{fragments/messages :: messages}"></th:block>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-exchange-alt"></i> Transações</h1>
            <a th:href="@{/transaction/create}" class="btn btn-success">
                <i class="fas fa-plus"></i> Nova Transação
            </a>
        </div>

        <!-- Tabela de transações -->
        <div th:if="${#lists.isEmpty(transactionsList)}" class="alert alert-info text-center">
            <i class="fas fa-info-circle"></i> Nenhuma transação cadastrada.
            <a th:href="@{/transaction/create}">Cadastre a primeira!</a>
        </div>

        <div th:unless="${#lists.isEmpty(transactionsList)}" class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Valor</th>
                        <th scope="col">Tipo</th>
                        <th scope="col">Categoria</th>
                        <th scope="col">Data</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="transaction : ${transactionsList}">
                        <td th:text="${transaction.id}"></td>
                        <td th:text="${transaction.description}"></td>
                        <td>
                            <span th:classappend="${transaction.type == 'RECEITA'} ? 'text-success' : 'text-danger'">
                                R$ <span th:text="${#numbers.formatDecimal(transaction.amount, 1, 2)}"></span>
                            </span>
                        </td>
                        <td>
                            <span class="badge"
                                th:classappend="${transaction.type == 'RECEITA'} ? 'badge-success' : 'badge-danger'"
                                th:text="${transaction.type}">
                            </span>
                        </td>
                        <td th:text="${transaction.category}"></td>
                        <td th:text="${#temporals.format(transaction.date, 'dd/MM/yyyy')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>

</html>
